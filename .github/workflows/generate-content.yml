name: Generate Content

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: pip install edge-tts

      - name: Check if generation should run
        id: check
        run: |
          RESULT=$(node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('config/briefbeacon.json','utf-8'));
            const tz = config.scheduler.timezone || 'Asia/Kolkata';
            const fill = config.scheduler.initial_fill || {};
            const now = new Date();
            const parts = new Intl.DateTimeFormat('en-CA', {
              timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
              hour: '2-digit', minute: '2-digit', hour12: false
            }).formatToParts(now);
            const get = (t) => parts.find(p => p.type === t)?.value || '';
            const today = get('year') + '-' + get('month') + '-' + get('day');
            const currentHour = get('hour');
            const currentMin = get('minute');
            const currentTime = currentHour + ':' + currentMin;

            console.log('Timezone:', tz);
            console.log('Today (TZ):', today);
            console.log('Current time (TZ):', currentTime);

            if (fill.enabled && today === fill.date) {
              console.log('mode=fill');
              console.log('Running in initial fill mode (15-min intervals)');
            } else {
              const times = config.scheduler.times || ['09:00'];
              const matched = times.some(t => t === currentTime);
              if (matched) {
                console.log('mode=scheduled');
                console.log('Running in scheduled mode');
              } else {
                console.log('mode=skip');
                console.log('Not a scheduled time, skipping');
              }
            }
          ")

          echo "$RESULT"
          if echo "$RESULT" | grep -q "mode=fill"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "mode=fill" >> $GITHUB_OUTPUT
          elif echo "$RESULT" | grep -q "mode=scheduled"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "mode=scheduled" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate content (fill mode)
        if: steps.check.outputs.should_run == 'true' && steps.check.outputs.mode == 'fill'
        run: npm run generate

      - name: Generate content (scheduled mode)
        if: steps.check.outputs.should_run == 'true' && steps.check.outputs.mode == 'scheduled'
        run: npm run generate

      - name: Commit and push
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config user.name "BriefBeakon Bot"
          git config user.email "bot@briefbeakon.ai"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-generate content [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
