name: Generate Content

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Check if generation should run
        id: check
        run: |
          CONFIG=$(cat config/briefbeacon.json)
          TZ=$(echo "$CONFIG" | node -e "const d=require('fs').readFileSync(0,'utf8');const c=JSON.parse(d);console.log(c.scheduler.timezone)")
          INITIAL_FILL=$(echo "$CONFIG" | node -e "const d=require('fs').readFileSync(0,'utf8');const c=JSON.parse(d);console.log(JSON.stringify(c.scheduler.initial_fill))")

          FILL_ENABLED=$(echo "$INITIAL_FILL" | node -e "const d=require('fs').readFileSync(0,'utf8');const c=JSON.parse(d);console.log(c.enabled)")
          FILL_DATE=$(echo "$INITIAL_FILL" | node -e "const d=require('fs').readFileSync(0,'utf8');const c=JSON.parse(d);console.log(c.date)")

          TODAY=$(TZ=$TZ date +%Y-%m-%d)
          CURRENT_HOUR=$(TZ=$TZ date +%H)
          CURRENT_MIN=$(TZ=$TZ date +%M)
          CURRENT_TIME=$(printf "%02d:%02d" $CURRENT_HOUR $CURRENT_MIN)

          echo "Timezone: $TZ"
          echo "Today (TZ): $TODAY"
          echo "Current time (TZ): $CURRENT_TIME"
          echo "Fill enabled: $FILL_ENABLED"
          echo "Fill date: $FILL_DATE"

          SHOULD_RUN=false
          MODE=""

          # Check initial fill mode
          if [ "$FILL_ENABLED" = "true" ] && [ "$TODAY" = "$FILL_DATE" ]; then
            SHOULD_RUN=true
            MODE="fill"
            echo "mode=fill" >> $GITHUB_OUTPUT
            echo "Running in initial fill mode (15-min intervals)"
          else
            # Normal schedule: check if current time matches configured times
            TIMES=$(echo "$CONFIG" | node -e "const d=require('fs').readFileSync(0,'utf8');const c=JSON.parse(d);const t=c.scheduler.times.join(' ');console.log(t)")
            echo "Scheduled times: $TIMES"
            for TIME in $TIMES; do
              if [ "$CURRENT_TIME" = "$TIME" ]; then
                SHOULD_RUN=true
                MODE="scheduled"
                echo "mode=scheduled" >> $GITHUB_OUTPUT
                echo "Running in scheduled mode"
                break
              fi
            done
          fi

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

      - name: Generate content (fill mode)
        if: steps.check.outputs.should_run == 'true' && steps.check.outputs.mode == 'fill'
        run: npm run generate

      - name: Generate content (scheduled mode)
        if: steps.check.outputs.should_run == 'true' && steps.check.outputs.mode == 'scheduled'
        run: npm run generate

      - name: Commit and push
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config user.name "BriefBeakon Bot"
          git config user.email "bot@briefbeakon.ai"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-generate content [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
